// Lager knapper for hver uke, gruppert etter måned
var knapper = document.getElementById("knapper");
var forrigeMaaned = "";
for (var i = 0; i < uker.length; i++) {
  var maaned = uker[i].dato.split(" ").pop(); // siste ord i datoen = måneden

  if (maaned !== forrigeMaaned) {
    var tittel = document.createElement("h3");
    tittel.className = "maaned";
    tittel.textContent = maaned.charAt(0).toUpperCase() + maaned.slice(1);
    knapper.appendChild(tittel);
    forrigeMaaned = maaned;
  }

  var knapp = document.createElement("button");
  knapp.className = "ukeknapp";
  knapp.textContent = "Uke " + uker[i].uke;
  knapp.onclick = (function(u) {
    return function() { visUke(u); };
  })(uker[i]);
  knapper.appendChild(knapp);
}

// Regner ut totale timer
function tilMinutter(t) {
  if (!t) return 0;
  var min = 0;
  var timer = t.match(/(\d+)\s*t/);
  var minutter = t.match(/(\d+)\s*min/);
  if (timer) min += parseInt(timer[1]) * 60;
  if (minutter) min += parseInt(minutter[1]);
  return min;
}
var sum = 0;
for (var j = 0; j < uker.length; j++) {
  sum += tilMinutter(uker[j].timer);
  uker[j].sumMin = sum; // riktig "sum frem til nå" for denne uka
}

function formaterTid(min) {
  var t = Math.floor(min / 60);
  var m = min % 60;
  if (m === 0) return t + " timer";
  return t + " t " + m + " min";
}

document.getElementById("total").textContent =
  "Totalt: " + formaterTid(sum) + " (av 168 timer)";

// Viser én uke
function visUke(u) {
  var html = "<h2>Uke " + u.uke + " - " + u.dato + "</h2>";
  html += "<p class='sted'>Sted: " + u.sted + "</p>";

  if (u.syk) {
    html += "<p><b>" + u.syk + "</b></p>";
  } else {
    html += "<table>";
    html += "<tr><th>Tidspunkt</th><th>Oppgaver</th><th>Egenvurdering</th><th>Kompetansemål</th></tr>";
    for (var k = 0; k < u.rader.length; k++) {
      var r = u.rader[k];
      html += "<tr><td>" + r[0] + "</td><td>" + r[1] + "</td><td>" + r[2] + "</td><td>" + r[3] + "</td></tr>";
    }
    html += "</table>";
    html += "<p class='timer'>Timer denne uken: " + u.timer + "</p>";
    html += "<p class='timer'>Sum frem til nå: " + formaterTid(u.sumMin) + " (av 168 timer)</p>";
  }

  document.getElementById("visning").innerHTML = html;
}
