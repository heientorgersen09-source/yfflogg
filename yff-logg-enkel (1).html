function tilMin(t){if(!t)return 0;var m=0,h=t.match(/(\d+)\s*t/),x=t.match(/(\d+)\s*min/);if(h)m+=h[1]*60;if(x)m+=+x[1];return m;}
function fmt(m){var t=Math.floor(m/60),r=m%60;return r?t+" t "+r+" min":t+" timer";}

// Løpende sum + total
var sum=0;
uker.forEach(function(u){sum+=tilMin(u.timer);u.sumMin=sum;});
document.getElementById("total").textContent="Totalt: "+fmt(sum)+" (av 168 timer)";

// Knapper gruppert etter måned
var k=document.getElementById("knapper"),forrige="";
uker.forEach(function(u){
  var md=u.dato.split(" ").pop();
  if(md!==forrige){var h=document.createElement("h3");h.className="maaned";h.textContent=md[0].toUpperCase()+md.slice(1);k.appendChild(h);forrige=md;}
  var b=document.createElement("button");b.className="ukeknapp";b.textContent="Uke "+u.uke;
  b.onclick=function(){visUke(u);};k.appendChild(b);
});

function visUke(u){
  var h="<h2>Uke "+u.uke+" - "+u.dato+"</h2><p class='sted'>Sted: "+u.sted+"</p>";
  if(u.syk){h+="<p><b>"+u.syk+"</b></p>";}
  else{
    h+="<table><tr><th>Tidspunkt</th><th>Oppgaver</th><th>Egenvurdering</th><th>Kompetansemål</th></tr>";
    u.rader.forEach(function(r){h+="<tr><td>"+r[0]+"</td><td>"+r[1]+"</td><td>"+r[2]+"</td><td>"+r[3]+"</td></tr>";});
    h+="</table><p class='timer'>Timer denne uken: "+u.timer+"</p>";
    h+="<p class='timer'>Sum frem til nå: "+fmt(u.sumMin)+" (av 168 timer)</p>";
  }
  if(bilder[u.uke]){h+="<img class='bilde' src='"+bilder[u.uke]+"'>";}
  document.getElementById("visning").innerHTML=h;
}
</script>
